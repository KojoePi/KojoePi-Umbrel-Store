version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: frontend
      APP_PORT: 80

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ${APP_DATA_DIR}/data:/app/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
