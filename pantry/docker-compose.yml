version: "3.7"

services:
  backend:
    build: ./backend
    container_name: pantry-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ${APP_DATA_DIR}/data:/app/data

  frontend:
    build: ./frontend
    container_name: pantry-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend